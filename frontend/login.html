<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMentor — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<!-- GitHub OAuth loading overlay -->
<div id="loading-overlay" class="loading-overlay" style="display:none">
  <div class="loading-card">
    <div class="spinner"></div>
    <p>Signing you in with GitHub…</p>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-header">
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">EduMentor</span>
    </div>
    <p class="auth-tagline">Your personal AI-powered tutor</p>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN TAB -->
    <div id="tab-login" class="tab-panel active">
      <div id="login-error" class="error-msg"></div>

      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com"
               required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••"
               required autocomplete="current-password" />
      </div>

      <button class="btn btn-primary submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="divider">or</div>
      <button class="github-btn" onclick="doGithubLogin()">
        <svg class="github-icon" viewBox="0 0 24 24">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>
    </div>

    <!-- SIGNUP TAB -->
    <div id="tab-signup" class="tab-panel">
      <div id="signup-error" class="error-msg"></div>

      <div class="form-group">
        <label class="form-label" for="signup-name">Full Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="Ada Lovelace"
               required maxlength="255" autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-email">Email address</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com"
               required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Min 8 characters"
               required minlength="8" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary submit-btn" id="signup-btn" onclick="doSignup()">Create Account</button>

      <div class="divider">or</div>
      <button class="github-btn" onclick="doGithubLogin()">
        <svg class="github-icon" viewBox="0 0 24 24">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
