<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMentor — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div id="app" class="app-layout">
  <!-- Sidebar injected by dashboard.js -->
  <div class="main-content">

    <div class="topbar">
      <span class="topbar-title">Dashboard</span>
      <a href="chat.html" class="btn btn-primary btn-sm">+ New Chat</a>
    </div>

    <div class="page-body">

      <!-- Welcome Banner -->
      <div class="welcome-banner">
        <div class="welcome-text">
          <h2 id="welcome-name">Welcome back 👋</h2>
          <p>Ready to continue learning? Pick up where you left off.</p>
        </div>
        <div class="welcome-avatar" id="welcome-avatar">?</div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">—</div>
          <div class="stat-label">Total Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-topics">—</div>
          <div class="stat-label">Topics Available</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-active">—</div>
          <div class="stat-label">Active Sessions</div>
        </div>
      </div>

      <!-- Topics -->
      <div class="section-header">
        <h2 class="section-title">📚 Topics to Study</h2>
      </div>
      <div id="topics-container" class="topics-skeleton">
        <div class="skeleton-card">
          <div class="skeleton-line" style="height:18px;width:60%"></div>
          <div class="skeleton-line" style="height:12px;width:90%"></div>
          <div class="skeleton-line" style="height:12px;width:75%"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line" style="height:18px;width:50%"></div>
          <div class="skeleton-line" style="height:12px;width:85%"></div>
          <div class="skeleton-line" style="height:12px;width:70%"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line" style="height:18px;width:55%"></div>
          <div class="skeleton-line" style="height:12px;width:80%"></div>
          <div class="skeleton-line" style="height:12px;width:65%"></div>
        </div>
      </div>

      <!-- Recent Sessions -->
      <div class="section-header" style="margin-top:32px">
        <h2 class="section-title">🕐 Recent Sessions</h2>
      </div>
      <div id="sessions-container">
        <div style="padding:16px;text-align:center;color:var(--color-text-muted)">
          <div class="spinner" style="margin:0 auto 8px"></div>
          Loading sessions…
        </div>
      </div>

    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
