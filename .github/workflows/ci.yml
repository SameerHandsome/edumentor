name: EduMentor CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: sameerhandsome12/edumentor

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.8.0
      - run: ruff check app/ alembic/ scripts/
      - run: ruff format --check app/ alembic/ scripts/

  # ── 2. Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      SYNC_DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      REDIS_TOKEN: fake-token
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: fake-key
      JWT_SECRET: test-secret-key-32-chars-minimum!!
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      GROQ_API_KEY: gsk_fake_groq_key_for_testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=12 \
            -v --timeout=60
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unit

  # ── 3. Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports: ["6333:6333"]
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      SYNC_DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      REDIS_TOKEN: fake-token
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: fake-key
      JWT_SECRET: test-secret-key-32-chars-minimum!!
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      GROQ_API_KEY: gsk_fake_groq_key_for_testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=10 \
            -v --timeout=120
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: integration

  # ── 4. Evaluation ────────────────────────────────────────────────────────────
  evaluation:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      SYNC_DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      REDIS_TOKEN: fake-token
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: fake-key
      JWT_SECRET: test-secret-key-32-chars-minimum!!
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run evaluation suite
        run: |
          pytest tests/evaluation/ \
            -m eval \
            -v -s --timeout=180 \
            --tb=short

  # ── 5. Docker Build & Push ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: evaluation
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Deploy to K8s ─────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - name: Deploy with Helm
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm upgrade --install edumentor ./k8s \
            --set image.tag=${{ github.sha }} \
            --set secrets.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set secrets.SYNC_DATABASE_URL="${{ secrets.SYNC_DATABASE_URL }}" \
            --set secrets.REDIS_URL="${{ secrets.REDIS_URL }}" \
            --set secrets.REDIS_TOKEN="${{ secrets.REDIS_TOKEN }}" \
            --set secrets.QDRANT_URL="${{ secrets.QDRANT_URL }}" \
            --set secrets.QDRANT_API_KEY="${{ secrets.QDRANT_API_KEY }}" \
            --set secrets.JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set secrets.CELERY_BROKER_URL="${{ secrets.CELERY_BROKER_URL }}" \
            --set secrets.CELERY_RESULT_BACKEND="${{ secrets.CELERY_RESULT_BACKEND }}" \
            --set secrets.LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}" \
            --wait --timeout=5m