# This file renders a Kubernetes Secret from values injected by CI.
# NEVER commit real values here — the secrets: block in values.yaml
# is intentionally empty. Real values are passed via:
#   helm upgrade --install edumentor ./k8s --set secrets.DATABASE_URL="..."
apiVersion: v1
kind: Secret
metadata:
  name: edumentor-secrets
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  SYNC_DATABASE_URL: {{ .Values.secrets.SYNC_DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | quote }}
  REDIS_TOKEN: {{ .Values.secrets.REDIS_TOKEN | quote }}
  QDRANT_URL: {{ .Values.secrets.QDRANT_URL | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.QDRANT_API_KEY | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  CELERY_BROKER_URL: {{ .Values.secrets.CELERY_BROKER_URL | quote }}
  CELERY_RESULT_BACKEND: {{ .Values.secrets.CELERY_RESULT_BACKEND | quote }}
  LANGSMITH_API_KEY: {{ .Values.secrets.LANGSMITH_API_KEY | quote }}
  GROQ_API_KEY: {{ .Values.secrets.GROQ_API_KEY | quote }}