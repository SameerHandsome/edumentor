[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic/versions/"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "--tb=short"

[tool.coverage.run]
source = ["app"]
omit = ["app/rag/check.py", "alembic/*"]